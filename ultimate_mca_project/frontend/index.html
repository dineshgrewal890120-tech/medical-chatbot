
<!DOCTYPE html>
<html>
<head>
<title>AI Medical Assistant</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<h2>AI Medical Chatbot</h2>
<input id="msg"><button onclick="send()">Send</button>
<div id="chat"></div>
<canvas id="chart"></canvas>
<script>
function send(){
let msg=document.getElementById("msg").value;
fetch"https://medical-chatbot-r77g.onrender.com/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({symptoms:msg})
})
.then(r=>r.json())
.then(data=>{
let labels=[];let values=[];
data.forEach(d=>{
document.getElementById("chat").innerHTML+=d.disease+" "+d.probability+"%<br>";
labels.push(d.disease);values.push(d.probability);
});
new Chart(document.getElementById("chart"),{
type:"bar",
data:{labels:labels,datasets:[{data:values}]}
});
});
}
</script>
</body>
</html>
